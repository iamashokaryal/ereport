<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enumerator Daily Reporting System - Login</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">

  
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1><i class="fas fa-clipboard-list"></i></h1>
        <h1>Enumerator System</h1>
        <p>Daily Reporting Portal</p>
      </div>

      <div class="login-body">
        <form id="loginForm">
          <div class="form-group">
            <label for="userId" class="form-label">
              <i class="fas fa-user"></i> User ID
            </label>
            <input
              type="text"
              class="form-control"
              id="userId"
              placeholder="Enter your ID"
              required
              autocomplete="username"
            >
          </div>

          <div class="form-group">
            <label for="password" class="form-label">
              <i class="fas fa-lock"></i> Password
            </label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            >
          </div>

          <button type="submit" class="btn btn-primary btn-login">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>
        </form>

        <div id="loginMessage" class="mt-20"></div>
      </div>

      <div class="login-footer">
        <div class="mb-10">
          <strong>Demo Admin Account:</strong><br>
          ID: <code>admin</code><br>
          Password: <code>admin123</code>
        </div>
        <small>For production, use secure credentials and HTTPS.</small>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebaseapp/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebaseapp/10.7.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebaseapp/10.7.0/firebase-auth.js"></script>

  <!-- Firebase Config -->
  <script src="firebase-config.js"></script>

  <!-- Shared Scripts -->
  <script src="script.js"></script>

  <!-- Login Page Script -->
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) {
      const session = getSession();
      if (session.role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'enumerator.html';
      }
    }

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('loginMessage');

      // Reset message
      messageDiv.innerHTML = '';

      if (!userId || !password) {
        messageDiv.innerHTML = '<div class="alert alert-danger">Please fill in all fields</div>';
        return;
      }

      // Show loading state
      const btn = e.target.querySelector('button');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Logging in...';

      try {
        // Verify login credentials
        const result = await verifyLogin(userId, password);

        if (result.success) {
          // Set session
          setSession(result.userId, result.name, result.role, result.area);

          // Show success message
          messageDiv.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Login successful! Redirecting...</div>';

          // Redirect based on role
          setTimeout(() => {
            if (result.role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'enumerator.html';
            }
          }, 1000);
        } else {
          messageDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ${result.message}</div>`;
          btn.disabled = false;
          btn.innerHTML = originalText;
        }
      } catch (error) {
        console.error('Login error:', error);
        messageDiv.innerHTML = '<div class="alert alert-danger">Login error. Please check your connection and try again.</div>';
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    });
  </script>
</body>
</html>
